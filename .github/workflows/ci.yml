name: C++ Automated Build and Test

# Trigger this pipeline every time code is pushed to the repository
on: [push, pull_request]

jobs:
  build-and-test:
    # Run this on a clean, cloud-hosted Ubuntu environment provided by GitHub
    runs-on: ubuntu-latest

    steps:
    # Step 1: Download your repository code onto the runner
    - name: Checkout Code
      uses: actions/checkout@v5

    # Step 2: Install CMake and GCC compiler tools
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake

    # Step 3: Run CMake to generate build files and download Catch2
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    # Step 4: Compile the code into an executable
    - name: Build Project
      run: cmake --build build --config Release

    # Step 5: Execute the automated tests using CTest
    - name: Run Tests
      run: |
        cd build
        ctest --output-on-failure